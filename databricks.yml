# The name of the bundle. run `databricks bundle schema` to see the full bundle settings schema.
bundle:
  # Do not modify the below line, this autogenerated field is used by the Databricks backend. Identifies your Databricks Asset Bundle (DAB) project.
  uuid: d9ca5afd-86a4-4b82-a9ea-ec85a2de8d32
  name: ngm_mlops
  description: "NGM MLOps Platform"

artifacts:
  ngm_mlops_wheel:
    type: whl
    path: .
    build: "pip install build && python -m build --wheel"

resources:
  schemas:
    features:
      name: features
      catalog_name: ${var.catalog_name}
    
    predictions:
      name: predictions
      catalog_name: ${var.catalog_name}
    
    monitoring:
      name: monitoring
      catalog_name: ${var.catalog_name}
  
  registered_models:
    churn_model:
      name: churn_model
      catalog_name: ${var.catalog_name}
    
    fraud_model:
      name: fraud_model
      catalog_name: ${var.catalog_name}

variables:
  experiment_name:
    description: Experiment name for the model training.
    default: /Users/${workspace.current_user.userName}/${bundle.target}-ngm_mlops-experiment
  git_sha:
    description: "Git commit SHA"
    default: "local"
  model_name:
    description: Model name for the model training.
    default: ngm_mlops-model
  catalog_name:
    description: The catalog name to save the trained model
    
include:
  # Resources folder contains ML artifact resources for the ML project that defines model and experiment
  # And workflows resources for the ML project including model training -> validation -> deployment,
  # feature engineering,  batch inference, quality monitoring, metric refresh, alerts and triggering retraining
  - resources/jobs/*.yml
  #- resources/models
  #- resources/serving
  # TODO: uncomment once monitoring inference table has been created
  # - ./resources/monitoring-resource.yml

sync:
  include:
    - src

# Deployment Target specific values for workspaces
targets:
  rnd:  # Research & Development - for active development
    mode: development
    default: true
    variables:
      catalog_name: ngm_ml_rnd
      git_sha: "rnd-build"
    workspace:
      host: DATABRICKS_HOST_RND #https://adb-1108654228307752.12.azuredatabricks.net  # Set via env var or CLI: --var="databricks_host=https://..."
      root_path:  "~/Repos/ngm_mlops-rnd"
    resources:
      jobs:
        train_job:
          pause_status: UNPAUSED
        validate_job:
          pause_status: UNPAUSED
        batch_inference_job:
          pause_status: UNPAUSED
        feature_engineering_job:
          pause_status: UNPAUSED

  dev:  # Development - for unit testing
    mode: development
    variables:
      catalog_name: dev
      git_sha: "dev-build"
      workspace_path: "~/Repos/ngm_mlops-dev"
    workspace:
      host: DATABRICKS_HOST_DEV #https://adb-1108654228307752.12.azuredatabricks.net
      root_path: ~/Repos/ngm_mlops-dev
    resources:
      jobs:
        train_job:
          pause_status: PAUSED
        validate_job:
          pause_status: PAUSED
        batch_inference_job:
          pause_status: PAUSED
        feature_engineering_job:
          pause_status: PAUSED

  uat:  # User Acceptance Testing - for integration testing
    variables:
      catalog_name: uat
      git_sha: "uat-build"
      workspace_path: "/Workspace/Repos/ngm_mlops-uat"
    workspace:
      host: DATABRICKS_HOST_UAT #https://adb-1108654228307752.12.azuredatabricks.net
      root_path: /Workspace/Repos/ngm_mlops-uat
    resources:
      jobs:
        train_job:
          pause_status: PAUSED
        validate_job:
          pause_status: PAUSED
        batch_inference_job:
          pause_status: PAUSED
        feature_engineering_job:
          pause_status: PAUSED

  preprod:  # Pre-Production - final staging before prod
    variables:
      catalog_name: preprod
      git_sha: "preprod-build"
      workspace_path: "/Workspace/Repos/ngm_mlops-preprod"
    workspace:
      host: DATABRICKS_HOST_PREPROD #https://adb-1108654228307752.12.azuredatabricks.net
      root_path: /Workspace/Repos/ngm_mlops-preprod
    resources:
      jobs:
        train_job:
          pause_status: PAUSED
        validate_job:
          pause_status: PAUSED
        batch_inference_job:
          pause_status: PAUSED
        feature_engineering_job:
          pause_status: PAUSED

  prod:  # Production - final deployment
    variables:
      catalog_name: prod
      git_sha: "prod-build"
      workspace_path: "/Workspace/Repos/ngm_mlops-prod"
    workspace:
      host: DATABRICKS_HOST_PROD #https://adb-1108654228307752.12.azuredatabricks.net
      root_path: /Workspace/Repos/ngm_mlops-prod
    resources:
      jobs:
        train_job:
          pause_status: PAUSED
        validate_job:
          pause_status: PAUSED
        batch_inference_job:
          pause_status: PAUSED
        feature_engineering_job:
          pause_status: PAUSED
