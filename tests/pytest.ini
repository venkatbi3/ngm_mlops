[pytest]
# Pytest configuration for NGM MLOps testing

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum version requirement
minversion = 7.0

# Test paths
testpaths = tests

# Markers for organizing tests
markers =
    unit: Unit tests that don't require external dependencies
    integration: Integration tests requiring Databricks connectivity
    slow: Tests that take longer than 1 minute
    smoke: Quick smoke tests for CI pipeline
    databricks: Tests requiring Databricks environment

# Output options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --color=yes
    --durations=10
    -ra

# Coverage options (if using pytest-cov)
# Uncomment to enable coverage reporting
# addopts = --cov=src --cov-report=html --cov-report=term

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Timeout for tests (requires pytest-timeout)
# timeout = 300

# Parallel execution (requires pytest-xdist)
# addopts = -n auto

# Environment variables for tests
env =
    MLFLOW_TRACKING_URI=databricks
    SPARK_LOCAL_IP=127.0.0.1
