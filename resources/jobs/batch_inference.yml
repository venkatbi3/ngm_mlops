name: batch_inference_job
tasks:
  - task_key: batch_inference_churn
    python_wheel_task:
      package_name: ngm_mlops
      entry_point: ngm-inference
      parameters: ["--model", "churn", "--env", "${var:environment}"]
    new_cluster:
      spark_version: "13.3.x-scala2.12"
      node_type_id: "i3.xlarge"
      num_workers: 4
    timeout_seconds: 7200
    schedule:
      # Daily - churn patterns are stable
      quartz_cron_expression: "0 0 2 * * SUN"      

  - task_key: batch_inference_fraud
    python_wheel_task:
      package_name: ngm_mlops
      entry_point: ngm-inference
      parameters: ["--model", "fraud", "--env", "${var:environment}"]
    new_cluster:
      spark_version: "13.3.x-scala2.12"
      node_type_id: "i3.xlarge"
      num_workers: 4
    timeout_seconds: 7200
    depends_on:
      - task_key: batch_inference_churn
    schedule:
      # Daily - fraud evolves quickly
      quartz_cron_expression: "0 0 2 * * *"        

