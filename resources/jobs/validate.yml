resources:
  jobs:
    validate_job:
      name: validate_job
      tasks:
        - task_key: validate_churn
          python_wheel_task:
            package_name: ngm_mlops
            entry_point: ngm-validate
            parameters: ["--model", "churn", "--env", "${var:environment}", "--git_sha", "${var.git_sha}"]
          new_cluster:
            spark_version: "13.3.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 1
          timeout_seconds: 1800
          schedule:
            # Daily - churn patterns are stable
            quartz_cron_expression: "0 0 2 * * SUN"

        - task_key: validate_fraud
          python_wheel_task:
            package_name: ngm_mlops
            entry_point: ngm-validate
            parameters: ["--model", "fraud", "--env", "${var:environment}", "--git_sha", "${var.git_sha}"]
          new_cluster:
            spark_version: "13.3.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 1
          timeout_seconds: 1800
          depends_on:
            - task_key: validate_churn
          schedule:
            # Daily - fraud evolves quickly
            quartz_cron_expression: "0 0 2 * * *"

