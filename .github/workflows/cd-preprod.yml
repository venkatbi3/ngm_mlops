name: CICD - Preprod

on:
  workflow_dispatch:
    inputs:
      git_sha:
        description: 'Git SHA to deploy (defaults to HEAD)'
        required: false
  push:
    branches: [ preprod ]  
  pull_request:
    branches: [ preprod ]

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}  # For Personal Access Token authentication
  #DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }} # For Service Princial authentication
  #DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}  # For Service Princial authentication
 # DATABRICKS_TENANT_ID: ${{ secrets.DATABRICKS_TENANT_ID }}  # For Service Princial authentication     

jobs:
  deploy-preprod:
    name: Deploy to Preprod
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip 
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main    

      - name: Verify Databricks CLI and Environment Variables
        run: |
          echo "=== Databricks CLI Version ==="
          databricks --version
          echo "=== Databricks Host ==="
          echo "DATABRICKS_HOST is set: ${{ env.DATABRICKS_HOST != '' }}"
          echo "DATABRICKS_CLIENT_ID is set: ${{ env.DATABRICKS_CLIENT_ID != '' }}"
          echo "DATABRICKS_TENANT_ID is set: ${{ env.DATABRICKS_TENANT_ID != '' }}"
          echo "DATABRICKS_CLIENT_SECRET is set: ${{ env.DATABRICKS_CLIENT_SECRET != '' }}"  

      - name: Build wheel
        run: python -m build --wheel

      - name: Validate imports
        run: |
          python -c "from src.common.config import load_model_config; print('Config module loaded')"
          python -c "from src.common.logger import setup_logging; print('Logger module loaded')"
          python -c "from src.common.exceptions import PipelineError; print('Exceptions module loaded')"

      - name: Run smoke tests
        run: pytest -v tests/unit/test_smoke.py --tb=short

      - name: Validate Databricks bundle
        run: |
          echo "Validating bundle configuration for Preprod..."
          databricks bundle validate -t preprod --var="databricks_host=${{ env.DATABRICKS_HOST }}"

      - name: Deploy to Databricks
        run: |
          echo "Deploying to Databricks Preprod environment..."
          GIT_SHA=${{ github.event.inputs.git_sha || github.sha }}
          databricks bundle deploy -t preprod \
            --var="databricks_host=${{ env.DATABRICKS_HOST }}" \
            --var="git_sha=${GIT_SHA}"

      - name: Deployment complete
        run: |
          echo "Deployment to Preprod completed successfully"
          echo "Git SHA: ${{ github.event.inputs.git_sha || github.sha }}"
          echo "Target: Preprod (preprod catalog)"