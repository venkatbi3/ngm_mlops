# Churn Model Configuration
# Environment-specific overrides: Use Databricks variables or environment files per deployment

model_key: churn
registered_model_name: churn_model
trainer_class: ChurnTrainer
validator_class: ChurnValidator
inference_class: ChurnInference

data:
  features_table: "${var.catalog_name}.churn.churn_features"
  label_col: "churn_label"
  source_catalog: "bigquery_catalog"
  source_schema: "Integration"
  start_date: "2019-10-01"
  end_date: "2025-03-01"

metrics:
  auc_threshold: 0.75
  min_recall: 0.80
  precision_threshold: 0.75

hyperparameters:
  n_estimators: 100
  max_depth: 15
  min_samples_split: 2
  min_samples_leaf: 1
  random_state: 42

output:
  catalog: "${var.catalog_name}"
  schema: "churn"
  table: "churn_scores"

# Data source configuration
bigquery:
  catalog: "bigquery_catalog"
  dataset: "Integration"


